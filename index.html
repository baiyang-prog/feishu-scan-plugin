<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>扫码测试</title>
    <style>
        body { padding: 30px; font-size: 16px; font-family: Arial,"Microsoft YaHei"; }
        #status { font-size: 20px; margin: 20px 0; }
        .success { color: #00b42a; }
        .error { color: #ff4d4f; }
    </style>
</head>
<body>
    <h1>✅ 扫码录入（已修复SDK）</h1>
    <div id="status">初始化中...</div>
    <div id="log"></div>

<script>
    // ==========================
    // 你的配置（不用改）
    // ==========================
    const config = {
        appToken: "WJiUwFvh1iarWUkCAMkcWySfn8g",
        tableId: "tblRe2YOFsaLmJ4J"
    };

    let ttkit = null;

    // ==========================
    // 加载飞书 SDK
    // ==========================
    function loadSDK() {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = "https://lf16-cn-toutiaocdn-tos.bytecdns.com/obj/feishuikit/feishuikit-opensdk-v6/feishuikit-opensdk.min.js";
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
        });
    }

    // ==========================
    // 初始化
    // ==========================
    async function init() {
        try {
            await loadSDK();
            ttkit = window.ttkit;
            setStatus("✅ 初始化完成，等待扫码...");
            startScanListener();
        } catch (err) {
            setStatus("❌ SDK 加载失败", "error");
        }
    }

    // ==========================
    // 扫码监听
    // ==========================
    function startScanListener() {
        let inputStr = "";
        let lastTime = Date.now();

        document.addEventListener("keydown", (e) => {
            e.stopPropagation();
            e.preventDefault();

            const now = Date.now();
            if (now - lastTime > 50) inputStr = "";
            lastTime = now;

            if (e.key === "Enter") {
                if (inputStr.length > 2) {
                    onScan(inputStr);
                }
                inputStr = "";
                return;
            }

            inputStr += e.key;
        });
    }

    // ==========================
    // 扫码 → 创建记录
    // ==========================
    async function onScan(barcode) {
        setStatus("正在创建记录：" + barcode);
        try {
            const resp = await ttkit.request({
                method: "POST",
                url: `/open-apis/bitable/v1/apps/${config.appToken}/tables/${config.tableId}/records`,
                data: {
                    fields: {
                        "名称": "扫码录入",
                        "条码": barcode
                    }
                }
            });

            setStatus("✅ 创建成功：" + barcode, "success");
            addLog("记录已添加");
        } catch (err) {
            setStatus("❌ 创建失败", "error");
            addLog("错误：" + err.message);
            console.error(err);
        }
    }

    // ==========================
    // 工具
    // ==========================
    function setStatus(text, cls) {
        const el = document.getElementById("status");
        el.textContent = text;
        el.className = cls || "";
    }

    function addLog(text) {
        const log = document.getElementById("log");
        log.innerHTML += "<div>" + text + "</div>";
    }

    // 启动
    init();
</script>
</body>
</html>
