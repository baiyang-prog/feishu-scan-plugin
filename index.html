<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8>
    <title>扫码插件A</title>
    <style>
        body { padding: 30px; font-size: 16px; }
        #status { font-size: 20px; margin: 20px 0; }
        .success { color: #090; }
        .error { color: #f00; }
    </style>
</head>
<body>
    <h1>✅ 扫码录入</h1>
    <div id="status">初始化...</div>

<script src="https://lf16-cn-toutiaocdn-tos.bytecdns.com/obj/feishuikit/feishuikit-opensdk-v6/feishuikit-opensdk.min.js"></script>
<script>
    const config = {
        appToken: "WJiUwFvh1iarWUkCAMkcWySfn8g",
        tableId: "tblRe2YOFsaLmJ4J"
    };

    window.onload = async function () {
        try {
            const h5Sdk = window.H5SDK;
            const kit = h5Sdk.getKitContext();
            window.scanKit = kit;
            setStatus("✅ 等待扫码...");
            startScan();
        } catch (e) {
            setStatus("❌ 初始化失败", "error");
        }
    };

    let code = "";
    let lastTime = Date.now();

    function startScan() {
        document.addEventListener("keydown", (e) => {
            e.stopPropagation();
            const now = Date.now();
            if (now - lastTime > 50) code = "";
            lastTime = now;

            if (e.key === "Enter") {
                if (code.length > 2) createRecord(code);
                code = "";
                return;
            }
            code += e.key;
        });
    }

    async function createRecord(barcode) {
        setStatus("正在创建：" + barcode);
        try {
            const result = await window.scanKit.callNative({
                method: "bitable.createRecord",
                params: {
                    appToken: config.appToken,
                    tableId: config.tableId,
                    fields: {
                        "名称": "扫码录入",
                        "条码": barcode
                    }
                }
            });

            setStatus("✅ 创建成功：" + barcode, "success");
        } catch (err) {
            setStatus("❌ 失败：" + err.message, "error");
            console.error(err);
        }
    }

    function setStatus(text, cls) {
        const s = document.getElementById("status");
        s.textContent = text;
        s.className = cls || "";
    }
</script>
</body>
</html>
