<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>扫码插件</title>
    <style>
        body { padding: 30px; font-size: 16px; font-family: Microsoft YaHei; }
        #status { font-size: 20px; margin: 20px 0; }
        .success { color: #00b42a; }
        .error { color: #ff4d4f; }
    </style>
</head>
<body>
    <h1>✅ 扫码录入</h1>
    <div id="status">页面加载中...</div>
    <div id="log"></div>

<!-- 飞书官方 SDK 必须放在这里 -->
<script src="https://lf16-cn-toutiaocdn-tos.bytecdns.com/obj/feishuikit/feishuikit-opensdk-v6/feishuikit-opensdk.min.js"></script>

<script>
    // ==========================
    // 你的配置
    // ==========================
    const config = {
        appToken: "WJiUwFvh1iarWUkCAMkcWySfn8g",
        tableId: "tblRe2YOFsaLmJ4J"
    };

    // 等待 SDK 就绪
    window.onload = async function () {
        try {
            const ttkit = window.ttkit;
            setStatus("✅ 就绪，等待扫码...");
            startScan(ttkit);
        } catch (e) {
            setStatus("❌ 初始化失败", "error");
        }
    };

    // ==========================
    // 扫码监听
    // ==========================
    function startScan(ttkit) {
        let inputStr = "";
        let lastTime = Date.now();

        document.addEventListener("keydown", (e) => {
            e.stopPropagation(); // 关键：不让飞书捕获

            const now = Date.now();
            if (now - lastTime > 50) inputStr = "";
            lastTime = now;

            if (e.key === "Enter") {
                if (inputStr.length > 2) {
                    onScan(ttkit, inputStr);
                }
                inputStr = "";
                return;
            }
            inputStr += e.key;
        });
    }

    // ==========================
    // 执行扫码 → 创建记录
    // ==========================
    async function onScan(ttkit, barcode) {
        setStatus("正在创建：" + barcode);
        try {
            const res = await ttkit.request({
                method: "POST",
                url: `/open-apis/bitable/v1/apps/${config.appToken}/tables/${config.tableId}/records`,
                data: {
                    fields: {
                        "名称": "扫码录入",
                        "条码": barcode
                    }
                }
            });

            setStatus("✅ 创建成功：" + barcode, "success");
        } catch (err) {
            setStatus("❌ 失败：" + err.message, "error");
            console.error(err);
        }
    }

    function setStatus(text, cls) {
        const el = document.getElementById("status");
        el.textContent = text;
        el.className = cls || "";
    }
</script>
</body>
</html>
